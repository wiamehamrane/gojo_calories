workflows:
  ios-app-store:
    name: GojoCalories iOS Build & App Store
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    integrations:
      app_store_connect: Codemagic CI
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          cp ios_signing/gojo_profile.mobileprovision "$PROFILES_HOME"/profile.mobileprovision
          keychain add-certificates --certificate ios_signing/gojo_distribution.p12 --certificate-password ""
          xcode-project use-profiles
      - name: Install dependencies
        script: |
          flutter packages pub get
      - name: Force Apple Distribution Identity
        script: |
          sed -i '' 's/iPhone Developer/Apple Distribution/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/Automatic/Manual/g' ios/Runner.xcodeproj/project.pbxproj
      - name: iOS release build
        script: |
          flutter build ipa --release --export-method=app-store
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - jadtneamou@proton.me
          - zelghourfi@gmail.com
      app_store_connect:
        auth: integration
        submit_to_app_store: false
        submit_to_testflight: true
