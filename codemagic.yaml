workflows:
  ios-app-store:
    name: GojoCalories iOS Build & App Store
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    integrations:
      app_store_connect: Codemagic CI
    scripts:
      - name: Set up code signing
        script: |
          export APP_STORE_CONNECT_ISSUER_ID="ada504ee-3c9d-4491-b7b2-db490afe913a"
          export APP_STORE_CONNECT_KEY_IDENTIFIER="G4ML936L73"
          export APP_STORE_CONNECT_PRIVATE_KEY="$(cat ios_signing/AuthKey.p8)"
          keychain initialize
          app-store-connect fetch-signing-files "com.gojocalories.gojocalories" --type IOS_APP_DEVELOPMENT --create || true
          app-store-connect fetch-signing-files "com.gojocalories.gojocalories" --type IOS_APP_STORE --create
          keychain add-certificates
          keychain add-certificates --certificate ios_signing/gojo_development.p12 --certificate-password "" || true
          xcode-project use-profiles
      - name: Install dependencies
        script: |
          flutter packages pub get
      - name: iOS release build
        script: |
          # 1. Clean workspace and analyze environment
          git checkout ios/Runner.xcodeproj/project.pbxproj
          rm -f ios/Podfile
          
          echo "SEARCHING FOR SECURITY ASSETS..."
          find "$HOME" -name "*.p12" -o -name "*.mobileprovision"
          security list-keychains -d user
          security find-identity -v -p codesigning
          
          # 2. Compile and Archive (Unsigned with Team Anchor)
          flutter build ios --release --no-codesign
          sed -i '' '/flutter_additional_ios_build_settings(target)/a\
                target.build_configurations.each do |config|\
                  config.build_settings["CODE_SIGNING_ALLOWED"] = "NO"\
                  config.build_settings["CODE_SIGNING_REQUIRED"] = "NO"\
                end' ios/Podfile
          cd ios && pod install && cd ..
          
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -archivePath "$PWD/build/ios/archive/Runner.xcarchive" \
            -configuration Release \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DEVELOPMENT_TEAM=T8348X4CNY \
            CODE_SIGN_ALLOWED=NO \
            CODE_SIGN_REQUIRED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          # 3. forensic Profile Analysis
          PROFILE_PATH=$(find "$HOME" -name "*.mobileprovision" | head -n 1)
          if [ -n "$PROFILE_PATH" ]; then
            PROFILE_INFO=$(security cms -D -i "$PROFILE_PATH")
            PROFILE_UUID=$(echo "$PROFILE_INFO" | grep -aA1 UUID | grep string | awk -F '>|<' '{print $3}' | head -n 1)
            PROFILE_NAME=$(echo "$PROFILE_INFO" | sed -n '/<key>Name<\/key>/{n;p;}' | sed -E 's/.*<string>(.*)<\/string>.*/\1/' | head -n 1)
            
            FULL_SUBJECT=$(echo "$PROFILE_INFO" | sed -n '/<key>DeveloperCertificates<\/key>/{n;n;s/.*<data>\(.*\)<\/data>.*/\1/p;}' | base64 -D | openssl x509 -inform der -noout -subject)
            EXPECTED_CN=$(echo "$FULL_SUBJECT" | sed -E 's/.*CN[[:space:]]?=[[:space:]]?(.*[A-Z0-9)])/\1/' | awk -F ',' '{print $1}' | head -n 1)
            
            METHOD="app-store"
            if echo "$PROFILE_INFO" | grep -q "ProvisionedDevices"; then METHOD="ad-hoc"; fi
            echo "Profile: '$PROFILE_NAME' -> expects Certificate CN: '$EXPECTED_CN'"
            
            # 4. Locate matching identity using Team-ID Anchor
            CERT_INFO=$(security find-identity -v -p codesigning | grep "Distribution" | grep "T8348X4CNY" | head -n 1)
            if [ -z "$CERT_INFO" ]; then
                CERT_INFO=$(security find-identity -v -p codesigning | grep "$EXPECTED_CN" | head -n 1)
            fi
            
            CERT_HASH=$(echo "$CERT_INFO" | awk '{print $2}')
            CERT_NAME=$(echo "$CERT_INFO" | awk -F '"' '{print $2}')
            
            if [ -z "$CERT_HASH" ]; then
              echo "!! CRITICAL: NO VALID DISTRIBUTION CERTIFICATE FOUND FOR TEAM T8348X4CNY !!"
              echo "Ensure you have uploaded a .p12 certificate that matches Team ID T8348X4CNY."
            else
              echo "Binding Resolution: $CERT_NAME ($CERT_HASH)"
            fi

            # 5. Patch and Install
            DEST_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
            mkdir -p "$DEST_DIR"
            cp "$PROFILE_PATH" "$DEST_DIR/$PROFILE_UUID.mobileprovision"
            
            PLIST="ios_signing/ExportOptions.plist"
            plutil -replace method -string "$METHOD" "$PLIST"
            plutil -replace signingStyle -string "manual" "$PLIST"
            plutil -replace teamID -string "T8348X4CNY" "$PLIST"
            plutil -replace provisioningProfiles -json "{\"com.gojocalories.gojocalories\":\"$PROFILE_NAME\"}" "$PLIST"
            
            if [ -n "$CERT_NAME" ]; then
              plutil -replace signingCertificate -string "$CERT_NAME" "$PLIST"
            else
              plutil -remove signingCertificate "$PLIST" || true
            fi
            
            echo "Verified Production Configuration:"
            cat "$PLIST"
          else
            echo "FATAL: Provisioning Profile missing" && exit 1
          fi

          # 6. Final Export
          xcodebuild -exportArchive \
            -archivePath "$PWD/build/ios/archive/Runner.xcarchive" \
            -exportPath "$PWD/build/ios/ipa" \
            -exportOptionsPlist "$PWD/ios_signing/ExportOptions.plist" \
            CODE_SIGN_IDENTITY="${CERT_HASH:-Apple Distribution}" \
            DEVELOPMENT_TEAM=T8348X4CNY \
            CODE_SIGN_STYLE=Manual

    publishing:
      email:
        recipients:
          - jadtneamou@proton.me
          - zelghourfi@gmail.com
      app_store_connect:
        auth: integration
        submit_to_app_store: false
        submit_to_testflight: true
