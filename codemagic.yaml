workflows:
  ios-app-store:
    name: GojoCalories iOS Build & App Store
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    integrations:
      app_store_connect: Codemagic CI
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          
          # Manually install the provisioning profile
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp ios_signing/GojoCalories_App_Store_Profile.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/Profile.mobileprovision"
          
          # Import the confirmed certificate
          echo "Importing certificate..."
          keychain add-certificates \
            --certificate ios_signing/Certificates.p12 \
            --certificate-password "GojoCalories@2019"

          # Authorize the private key for codesigning.
          # We unlock the specific keychain Codemagic created.
          BUILD_KEYCHAIN=$(keychain get-default)
          security unlock-keychain -p "" "$BUILD_KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$BUILD_KEYCHAIN"

          # IMPORTANT: Download and inject Apple WWDR intermediate certificates
          # This establishes trust so Xcode sees the Apple Distribution certificate as "valid"
          echo "Downloading Apple WWDR certificates..."
          curl -s -O https://www.apple.com/certificateauthority/AppleWWDRCA.cer
          curl -s -O https://www.apple.com/certificateauthority/AppleWWDRCAG2.cer
          curl -s -O https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer
          curl -s -O https://www.apple.com/certificateauthority/AppleWWDRCAG4.cer

          echo "Importing Apple WWDR certificates into build keychain..."
          security import AppleWWDRCA.cer -k "$BUILD_KEYCHAIN" -A > /dev/null 2>&1 || true
          security import AppleWWDRCAG2.cer -k "$BUILD_KEYCHAIN" -A > /dev/null 2>&1 || true
          security import AppleWWDRCAG3.cer -k "$BUILD_KEYCHAIN" -A > /dev/null 2>&1 || true
          security import AppleWWDRCAG4.cer -k "$BUILD_KEYCHAIN" -A > /dev/null 2>&1 || true
          
          # Surgical patch of project.pbxproj to hardcode signing for the MAIN target only.
          # This prevents signing settings from leaking to Pods via the command line.
          echo "Surgically patching Runner project settings..."
          python3 -c "
          import sys, re
          path = 'ios/Runner.xcodeproj/project.pbxproj'
          content = open(path).read()
          
          # We explicitly define the exact string to inject immediately under buildSettings = {
          additions = r'\1\n\t\t\t\tCODE_SIGN_IDENTITY = \"Apple Distribution: Jad Tneamou (T8348X4CNY)\";\n\t\t\t\t\"CODE_SIGN_IDENTITY[sdk=iphoneos*]\" = \"Apple Distribution: Jad Tneamou (T8348X4CNY)\";\n\t\t\t\tCODE_SIGN_STYLE = Manual;\n\t\t\t\tDEVELOPMENT_TEAM = T8348X4CNY;\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = \"GojoCalories App Store Profile\";'
          
          # Patch the Native Target Release block (97C147071CF9000F007C117D)
          content = re.sub(r'(97C147071CF9000F007C117D /\* Release \*/ = \{[^{]+?buildSettings = \{)', additions, content)
          
          # Patch the Native Target Profile block (249021D4217E4FDB00AE95B9) just in case
          content = re.sub(r'(249021D4217E4FDB00AE95B9 /\* Profile \*/ = \{[^{]+?buildSettings = \{)', additions, content)

          with open(path, 'w') as f:
              f.write(content)
          print('Successfully patched native target pbxproj blocks')
          "

          # Generate a robust, hardcoded export_options.plist to guarantee settings
          echo "Generating export_options.plist manually..."
          cat <<EOF > "$HOME/export_options.plist"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.gojocalories.gojocalories</key>
                  <string>GojoCalories App Store Profile</string>
              </dict>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>teamID</key>
              <string>T8348X4CNY</string>
          </dict>
          </plist>
          EOF

      - name: Install dependencies
        script: |
          flutter packages pub get

      - name: iOS release build
        script: |
          # Step 1: Compile the Flutter/Dart code WITHOUT signing.
          flutter build ios --release --no-codesign

          # Step 2: Final Verify identities after partitioning
          # This confirms the private key is accessible.
          security find-identity -v -p codesigning
          
          # Step 3: Archive using raw xcodebuild
          # IMPORTANT: We do NOT pass PROVISIONING_PROFILE_SPECIFIER or CODE_SIGN_IDENTITY here.
          # These are now hardcoded into the Runner.xcodeproj/project.pbxproj for ONLY the main target.
          # This prevents them from leaking into Pods targets (Error 65).
          mkdir -p build/ios/xcarchive
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/xcarchive/Runner.xcarchive \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO

          # Step 4: Export the IPA using the previously generated export_options.plist
          mkdir -p build/ios/ipa
          xcodebuild \
            -exportArchive \
            -archivePath build/ios/xcarchive/Runner.xcarchive \
            -exportOptionsPlist "$HOME/export_options.plist" \
            -exportPath build/ios/ipa

      - name: Manual TestFlight Upload
        script: |
          # Use the provided App Store Connect API key to upload the binary.
          # This runs on the Codemagic macOS runner where 'altool' is present.
          app-store-connect publish \
            --path "build/ios/ipa/*.ipa" \
            --issuer-id "ada504ee-3c9d-4491-b7b2-db490afe913a" \
            --key-id "G4ML936L73" \
            --private-key "@file:ios_signing/AuthKey.p8" \
            --testflight

    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/export_options.plist
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - jadtneamou@proton.me
          - zelghourfi@gmail.com
      app_store_connect:
        auth: integration
        submit_to_app_store: false
        submit_to_testflight: true
