workflows:
  ios-app-store:
    name: GojoCalories iOS Build & App Store
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    integrations:
      app_store_connect: Codemagic CI # Make sure this matches your integration name in Codemagic Settings
    scripts:
      - name: Install dependencies
        script: flutter pub get
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "com.gojocalories.gojocalories" \
            --type IOS_APP_STORE \
            --create
      - name: Set up signing certificate
        script: keychain add-certificates
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: iOS release build
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - jadtneamou@proton.me
          - zelghourfi@gmail.com
      app_store_connect:
        auth: integration
        submit_to_app_store: false
        submit_to_testflight: true
