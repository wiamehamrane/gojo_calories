workflows:
  ios-app-store:
    name: GojoCalories iOS Build & App Store
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    integrations:
      app_store_connect: Codemagic CI
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          
          # Manually install the provisioning profile from the repo
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp ios_signing/gojo_profile.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/"
          
          # Proprobe for the correct P12 password
          P12_PATH="ios_signing/gojo_distribution.p12"
          CANDIDATES=("gojocalories" "GojoCalories" "gojocalories2026" "GojoCalories2026" "zelghourfi" "zakaria" "123456" "")
          
          for PASS in "${CANDIDATES[@]}"; do
            echo "Testing password: [${PASS}]"
            if keychain add-certificates --certificate "$P12_PATH" --certificate-password "$PASS" 2>/dev/null; then
              echo "SUCCESS: Certificate imported with password [${PASS}]"
              FOUND_PASS="$PASS"
              break
            fi
          done

          if [ -z "$FOUND_PASS" ] && [ -n "$CERTIFICATE_PASSWORD" ]; then
             echo "Testing password from environment variable..."
             keychain add-certificates --certificate "$P12_PATH" --certificate-password "$CERTIFICATE_PASSWORD" && FOUND_PASS="$CERTIFICATE_PASSWORD"
          fi

          # Diagnostics: Verify identities
          security find-identity -v -p codesigning
          
          # Patch the project
          xcode-project use-profiles --archive-method app-store

          # Debug: confirm the export_options.plist was generated
          echo "--- Generated export_options.plist ---"
          if [ -f "$HOME/export_options.plist" ]; then
            cat "$HOME/export_options.plist"
          else
            echo "ERROR: export_options.plist was not generated!"
            exit 1
          fi

      - name: Install dependencies
        script: |
          flutter packages pub get

      - name: iOS release build
        script: |
          # Step 1: Compile the Flutter/Dart code WITHOUT signing.
          flutter build ios --release --no-codesign

          # Step 2: Archive + sign + package the IPA using Codemagic's native CLI.
          # Explicitly passing the scheme and configuration.
          xcode-project build-ipa \
            --workspace "ios/Runner.xcworkspace" \
            --scheme "Runner" \
            --archive-flags="-configuration Release"

    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/export_options.plist
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - jadtneamou@proton.me
          - zelghourfi@gmail.com
      app_store_connect:
        auth: integration
        submit_to_app_store: false
        submit_to_testflight: true
