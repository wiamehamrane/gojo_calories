workflows:
  ios-app-store:
    name: GojoCalories iOS Build & App Store
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    integrations:
      app_store_connect: Codemagic CI
    scripts:
      - name: Set up code signing
        script: |
          export APP_STORE_CONNECT_ISSUER_ID="ada504ee-3c9d-4491-b7b2-db490afe913a"
          export APP_STORE_CONNECT_KEY_IDENTIFIER="G4ML936L73"
          export APP_STORE_CONNECT_PRIVATE_KEY="$(cat ios_signing/AuthKey.p8)"
          keychain initialize
          app-store-connect fetch-signing-files "com.gojocalories.gojocalories" --type IOS_APP_DEVELOPMENT --create || true
          app-store-connect fetch-signing-files "com.gojocalories.gojocalories" --type IOS_APP_STORE --create
          keychain add-certificates
          keychain add-certificates --certificate ios_signing/gojo_development.p12 --certificate-password "" || true
          xcode-project use-profiles
      - name: Install dependencies
        script: |
          flutter packages pub get
      - name: iOS release build
        script: |
          # 1. Ensure the workspace is clean and extract SHA-1 certificate fingerprint
          git checkout ios/Runner.xcodeproj/project.pbxproj
          rm -f ios/Podfile
          CERT_HASH=$(security find-identity -v -p codesigning | grep "Distribution" | head -n 1 | awk '{print $2}')
          CERT_NAME=$(security find-identity -v -p codesigning | grep "Distribution" | head -n 1 | awk -F '"' '{print $2}')
          echo "Detected Identity: $CERT_NAME ($CERT_HASH)"

          # 2. Compile and Archive (Unsigned)
          flutter build ios --release --no-codesign
          sed -i '' '/flutter_additional_ios_build_settings(target)/a\
                target.build_configurations.each do |config|\
                  config.build_settings["CODE_SIGNING_ALLOWED"] = "NO"\
                  config.build_settings["CODE_SIGNING_REQUIRED"] = "NO"\
                end' ios/Podfile
          cd ios && pod install && cd ..
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -archivePath build/ios/archive/Runner.xcarchive \
            -configuration Release \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

          # 3. Inspect and Install Provisioning Profile
          PROFILE_PATH=$(find "$HOME" -name "*.mobileprovision" | head -n 1)
          if [ -n "$PROFILE_PATH" ]; then
            PROFILE_INFO=$(security cms -D -i "$PROFILE_PATH")
            PROFILE_UUID=$(echo "$PROFILE_INFO" | grep -aA1 UUID | grep string | awk -F '>|<' '{print $3}')
            PROFILE_NAME=$(echo "$PROFILE_INFO" | grep -aA1 Name | grep string | awk -F '>|<' '{print $3}')
            METHOD="app-store"
            if echo "$PROFILE_INFO" | grep -q "ProvisionedDevices"; then 
              echo "AD HOC or DEV Profile Detected!"
              METHOD="ad-hoc"
              if echo "$PROFILE_INFO" | grep -q "get-task-allow" | grep -q "true"; then METHOD="development"; fi
            fi
            echo "Using Profile: $PROFILE_NAME ($PROFILE_UUID) with method: $METHOD"
            
            DEST_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
            mkdir -p "$DEST_DIR"
            cp "$PROFILE_PATH" "$DEST_DIR/$PROFILE_UUID.mobileprovision"
            
            # 4. Patch ExportOptions with absolute precision
            sed -i '' "s/app-store/$METHOD/g" ios_signing/ExportOptions.plist
            sed -i '' "s/__PROFILE_NAME__/$PROFILE_NAME/g" ios_signing/ExportOptions.plist
            sed -i '' "s/Apple Distribution/$CERT_NAME/g" ios_signing/ExportOptions.plist
          else
            echo "ERROR: No provisioning profile found" && exit 1
          fi

          # 5. Final Export using SHA-1 Fingerprint (Most reliable method)
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist "$PWD/ios_signing/ExportOptions.plist" \
            CODE_SIGN_IDENTITY="$CERT_HASH" \
            DEVELOPMENT_TEAM=T8348X4CNY
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - jadtneamou@proton.me
          - zelghourfi@gmail.com
      app_store_connect:
        auth: integration
        submit_to_app_store: false
        submit_to_testflight: true
