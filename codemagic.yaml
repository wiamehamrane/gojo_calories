workflows:
  ios-app-store:
    name: GojoCalories iOS Build & App Store
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    integrations:
      app_store_connect: Codemagic CI
    scripts:
      - name: Set up code signing
        script: |
          # Initialize a fresh CI keychain
          keychain initialize

          # Import certificates and provisioning profiles from Codemagic UI settings.
          # These are automatically available in the environment if configured in the UI.
          keychain add-certificates
          
          # Patch the Xcode project using the profiles found in the environment.
          xcode-project use-profiles --archive-method app-store

          # Diagnostics: Verify certificates and profiles are installed
          security find-identity -v -p codesigning
          ls -l "$HOME/Library/MobileDevice/Provisioning Profiles"

          # Debug: confirm the export_options.plist was generated
          echo "--- Generated export_options.plist ---"
          [ -f "$HOME/export_options.plist" ] && cat "$HOME/export_options.plist" || echo "export_options.plist not found"

      - name: Install dependencies
        script: |
          flutter packages pub get

      - name: iOS release build
        script: |
          # Step 1: Compile the Flutter/Dart code WITHOUT signing.
          flutter build ios --release --no-codesign

          # Step 2: Archive + sign + package the IPA using Codemagic's native CLI.
          # Explicitly passing the scheme and configuration.
          xcode-project build-ipa \
            --workspace "ios/Runner.xcworkspace" \
            --scheme "Runner" \
            --archive-flags="-configuration Release"

    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/export_options.plist
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - jadtneamou@proton.me
          - zelghourfi@gmail.com
      app_store_connect:
        auth: integration
        submit_to_app_store: false
        submit_to_testflight: true
