workflows:
  ios-app-store:
    name: GojoCalories iOS Build & App Store
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    integrations:
      app_store_connect: Codemagic CI
    scripts:
      - name: Set up code signing
        script: |
          # Initialize a fresh CI keychain (avoids interference from previous runs)
          keychain initialize

          # Feed ASC credentials explicitly so the CLI doesn't rely on the
          # integration being fully wired up in the Codemagic UI.
          # AuthKey.p8 is committed to the repo under ios_signing/.
          export APP_STORE_CONNECT_ISSUER_ID="ada504ee-3c9d-4491-b7b2-db490afe913a"
          export APP_STORE_CONNECT_KEY_IDENTIFIER="G4ML936L73"
          export APP_STORE_CONNECT_PRIVATE_KEY="$(cat ios_signing/AuthKey.p8)"

          # Fetch (or create) the App Store distribution certificate + provisioning profile
          app-store-connect fetch-signing-files "com.gojocalories.gojocalories" \
            --type IOS_APP_STORE \
            --create

          # Import the certificate into the CI keychain
          keychain add-certificates

          # Patch the Xcode project (sets CODE_SIGN_STYLE=Manual, injects the profile,
          # and auto-generates $HOME/export_options.plist for the build step below)
          xcode-project use-profiles

          # Debug: confirm the export_options.plist was generated
          echo "--- Generated export_options.plist ---"
          cat "$HOME/export_options.plist"

      - name: Install dependencies
        script: |
          flutter packages pub get

      - name: iOS release build
        script: |
          # Use the export options plist auto-generated by xcode-project use-profiles
          flutter build ipa --release \
            --export-options-plist="$HOME/export_options.plist"

    publishing:
      email:
        recipients:
          - jadtneamou@proton.me
          - zelghourfi@gmail.com
      app_store_connect:
        auth: integration
        submit_to_app_store: false
        submit_to_testflight: true
