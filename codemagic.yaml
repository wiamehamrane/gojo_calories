workflows:
  ios-app-store:
    name: GojoCalories iOS Build & App Store
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    integrations:
      app_store_connect: Codemagic CI
    scripts:
      - name: Diagnostic: Find signing files
        script: |
          echo "--- Environment Variables (Names Only) ---"
          printenv | cut -d= -f1
          echo "--- Searching for .p12 files ---"
          find $HOME -name "*.p12" 2>/dev/null
          find /Users/builder/clone -name "*.p12" 2>/dev/null
          echo "--- Searching for .mobileprovision files ---"
          find $HOME -name "*.mobileprovision" 2>/dev/null
          find /Users/builder/clone -name "*.mobileprovision" 2>/dev/null
          echo "--- Checking default locations ---"
          ls -R ~/Library/MobileDevice/Provisioning\ Profiles 2>/dev/null || echo "Profiles dir not found"
          ls -R ~/Library/Developer/Xcode/UserData/Certificates 2>/dev/null || echo "Certs dir not found"

      - name: Install dependencies
        script: |
          flutter packages pub get

      - name: iOS release build
        script: |
          # Step 1: Compile the Flutter/Dart code WITHOUT signing.
          flutter build ios --release --no-codesign

          # Step 2: Archive + sign + package the IPA using Codemagic's native CLI.
          # Explicitly passing the scheme and configuration.
          xcode-project build-ipa \
            --workspace "ios/Runner.xcworkspace" \
            --scheme "Runner" \
            --archive-flags="-configuration Release"

    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/export_options.plist
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - jadtneamou@proton.me
          - zelghourfi@gmail.com
      app_store_connect:
        auth: integration
        submit_to_app_store: false
        submit_to_testflight: true
