workflows:
  ios-app-store:
    name: GojoCalories iOS Build & App Store
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    integrations:
      app_store_connect: Codemagic CI
    scripts:
      - name: Set up code signing
        script: |
          # Initialize a fresh CI keychain
          keychain initialize

          # Explicitly pass ASC credentials so the CLI authenticates correctly
          export APP_STORE_CONNECT_ISSUER_ID="ada504ee-3c9d-4491-b7b2-db490afe913a"
          export APP_STORE_CONNECT_KEY_IDENTIFIER="G4ML936L73"
          export APP_STORE_CONNECT_PRIVATE_KEY="$(cat ios_signing/AuthKey.p8)"

          # Fetch (or create) the App Store distribution cert + provisioning profile
          app-store-connect fetch-signing-files "com.gojocalories.gojocalories" \
            --type IOS_APP_STORE \
            --create

          # Import the certificate into the CI keychain
          keychain add-certificates

          # Diagnostics: Verify certificates and profiles are installed
          security find-identity -v -p codesigning
          ls -l ~/Library/MobileDevice/Provisioning\ Profiles

          # Patch the Xcode project: sets CODE_SIGN_STYLE=Manual, injects profile,
          # and generates $HOME/export_options.plist.
          # We explicitly target the main bundle ID to avoid any ambiguity.
          xcode-project use-profiles --bundle-id "com.gojocalories.gojocalories"

          # Debug: confirm the export_options.plist was generated
          echo "--- Generated export_options.plist ---"
          cat "$HOME/export_options.plist"

      - name: Install dependencies
        script: |
          flutter packages pub get

      - name: iOS release build
        script: |
          # Step 1: Compile the Flutter/Dart code WITHOUT signing.
          flutter build ios --release --no-codesign

          # Step 2: Archive + sign + package the IPA using Codemagic's native CLI.
          # Explicitly passing the scheme and configuration.
          xcode-project build-ipa \
            --workspace "ios/Runner.xcworkspace" \
            --scheme "Runner" \
            --archive-flags="-configuration Release"

    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/export_options.plist
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - jadtneamou@proton.me
          - zelghourfi@gmail.com
      app_store_connect:
        auth: integration
        submit_to_app_store: false
        submit_to_testflight: true
