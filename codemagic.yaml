workflows:
  ios-app-store:
    name: GojoCalories iOS Build & App Store
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    integrations:
      app_store_connect: Codemagic CI
    scripts:
      - name: Set up code signing
        script: |
          export APP_STORE_CONNECT_ISSUER_ID="ada504ee-3c9d-4491-b7b2-db490afe913a"
          export APP_STORE_CONNECT_KEY_IDENTIFIER="G4ML936L73"
          export APP_STORE_CONNECT_PRIVATE_KEY="$(cat ios_signing/AuthKey.p8)"
          keychain initialize
          app-store-connect fetch-signing-files "com.gojocalories.gojocalories" --type IOS_APP_DEVELOPMENT --create || true
          app-store-connect fetch-signing-files "com.gojocalories.gojocalories" --type IOS_APP_STORE --create
          keychain add-certificates
          keychain add-certificates --certificate ios_signing/gojo_development.p12 --certificate-password "" || true
          xcode-project use-profiles
      - name: Install dependencies
        script: |
          flutter packages pub get
      - name: iOS release build
        script: |
          # 1. Globally override all signing identities to use Apple Distribution
          # This satisfies Flutter's internal validation even if a development certificate is missing
          sed -i '' 's/iPhone Developer/Apple Distribution/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' ios/Runner.xcodeproj/project.pbxproj

          # 2. Re-run pod install to ensure the custom Podfile (disabling Pod signing) is in effect
          cd ios && pod install && cd ..

          # 3. Build the IPA using the standard Flutter toolset
          # Now that Pods are unsigned and the project is forced to Apple Distribution, this should succeed.
          flutter build ipa --release --export-method=app-store --build-number=$BUILD_NUMBER
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - jadtneamou@proton.me
          - zelghourfi@gmail.com
      app_store_connect:
        auth: integration
        submit_to_app_store: false
        submit_to_testflight: true
