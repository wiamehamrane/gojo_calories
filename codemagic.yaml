workflows:
  ios-app-store:
    name: GojoCalories iOS Build & App Store
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    integrations:
      app_store_connect: Codemagic CI
    scripts:
      - name: Set up code signing
        script: |
          export APP_STORE_CONNECT_ISSUER_ID="ada504ee-3c9d-4491-b7b2-db490afe913a"
          export APP_STORE_CONNECT_KEY_IDENTIFIER="G4ML936L73"
          export APP_STORE_CONNECT_PRIVATE_KEY="$(cat ios_signing/AuthKey.p8)"
          keychain initialize
          
          # Use Codemagic's native fetch utility. It magically connects to Apple, provisions 
          # App Store distribution certificates and profiles, and injects them securely.
          app-store-connect fetch-signing-files "com.gojocalories.gojocalories" --type IOS_APP_STORE --create
          keychain add-certificates
          
          # Natively edits the XCode project to forcefully bind the freshly downloaded 
          # certificates (bypassing any corrupted manual configurations in pbxproj)
          xcode-project use-profiles
      - name: Install dependencies
        script: |
          flutter packages pub get
      - name: Patch Pods for Archive Stability
        script: |
          # The Stripe pods occasionally mandate signing unless we explicitly 
          # tell cocoapods to treat them as unsigned frameworks.
          sed -i '' '/flutter_additional_ios_build_settings(target)/a\
                target.build_configurations.each do |config|\
                  config.build_settings["CODE_SIGNING_ALLOWED"] = "NO"\
                  config.build_settings["CODE_SIGNING_REQUIRED"] = "NO"\
                end' ios/Podfile
      - name: iOS release build
        script: |
          # Build the flutter AOT and IPA securely using the automatically configured profiles
          flutter build ipa --release \
            --export-options-plist="$HOME/export_options.plist"

    publishing:
      email:
        recipients:
          - jadtneamou@proton.me
          - zelghourfi@gmail.com
      app_store_connect:
        auth: integration
        submit_to_app_store: false
        submit_to_testflight: true
