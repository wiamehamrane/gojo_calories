workflows:
  ios-app-store:
    name: GojoCalories iOS Build & App Store
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    integrations:
      app_store_connect: Codemagic CI
    scripts:
      - name: Set up code signing
        script: |
          export APP_STORE_CONNECT_ISSUER_ID="ada504ee-3c9d-4491-b7b2-db490afe913a"
          export APP_STORE_CONNECT_KEY_IDENTIFIER="G4ML936L73"
          export APP_STORE_CONNECT_PRIVATE_KEY="$(cat ios_signing/AuthKey.p8)"
          keychain initialize
          app-store-connect fetch-signing-files "com.gojocalories.gojocalories" --type IOS_APP_DEVELOPMENT --create || true
          app-store-connect fetch-signing-files "com.gojocalories.gojocalories" --type IOS_APP_STORE --create
          keychain add-certificates
          keychain add-certificates --certificate ios_signing/gojo_development.p12 --certificate-password "" || true
          xcode-project use-profiles
      - name: Install dependencies
        script: |
          flutter packages pub get
      - name: iOS release build
        script: |
          # 1. Diagnostic Audit and Identity Discovery
          git checkout ios/Runner.xcodeproj/project.pbxproj
          rm -f ios/Podfile
          
          echo "Listing all keychains..."
          security list-keychains -d user
          
          echo "Scanning all available identities..."
          security find-identity -v -p codesigning
          
          # Attempt to find identity by common Distribution keywords + Team ID
          CERT_INFO=$(security find-identity -v -p codesigning | grep -iE "Distribution|T8348X4CNY" | grep -v "skipped" | head -n 1)
          CERT_HASH=$(echo "$CERT_INFO" | awk '{print $2}')
          CERT_NAME=$(echo "$CERT_INFO" | awk -F '"' '{print $2}')
          echo "Binding Anchor: $CERT_NAME ($CERT_HASH)"

          # 2. Compile and Archive (Unsigned)
          flutter build ios --release --no-codesign
          sed -i '' '/flutter_additional_ios_build_settings(target)/a\
                target.build_configurations.each do |config|\
                  config.build_settings["CODE_SIGNING_ALLOWED"] = "NO"\
                  config.build_settings["CODE_SIGNING_REQUIRED"] = "NO"\
                end' ios/Podfile
          cd ios && pod install && cd ..
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -archivePath build/ios/archive/Runner.xcarchive \
            -configuration Release \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

          # 3. Inspect and Install Provisioning Profile
          PROFILE_PATH=$(find "$HOME" -name "*.mobileprovision" | head -n 1)
          if [ -n "$PROFILE_PATH" ]; then
            PROFILE_INFO=$(security cms -D -i "$PROFILE_PATH")
            PROFILE_UUID=$(echo "$PROFILE_INFO" | grep -aA1 UUID | grep string | awk -F '>|<' '{print $3}' | head -n 1)
            PROFILE_NAME=$(echo "$PROFILE_INFO" | sed -n '/<key>Name<\/key>/{n;p;}' | sed -E 's/.*<string>(.*)<\/string>.*/\1/' | head -n 1)
            
            METHOD="app-store"
            if echo "$PROFILE_INFO" | grep -q "ProvisionedDevices"; then 
              METHOD="ad-hoc"
              if echo "$PROFILE_INFO" | grep -q "get-task-allow" | grep -q "true"; then METHOD="development"; fi
            fi
            echo "Directing Export with: '$PROFILE_NAME' ($PROFILE_UUID) [$METHOD]"
            
            DEST_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
            mkdir -p "$DEST_DIR"
            cp "$PROFILE_PATH" "$DEST_DIR/$PROFILE_UUID.mobileprovision"
            
            # 4. Patch ExportOptions (Automated Resolution Strategy)
            PLIST="ios_signing/ExportOptions.plist"
            plutil -replace method -string "$METHOD" "$PLIST"
            plutil -replace signingStyle -string "manual" "$PLIST"
            plutil -replace teamID -string "T8348X4CNY" "$PLIST"
            
            # Use JSON for absolute key-path safety
            plutil -replace provisioningProfiles -json "{\"com.gojocalories.gojocalories\":\"$PROFILE_NAME\"}" "$PLIST"
            
            # REMOVE explicit signingCertificate to let Xcode's resolver find it based on the profile
            plutil -remove signingCertificate "$PLIST" || true
            
            echo "Verified Production Configuration:"
            cat "$PLIST"
          else
            echo "FATAL: Provisioning Profile missing from environment" && exit 1
          fi

          # 5. Final Export with Hinted Identity
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist "$PWD/ios_signing/ExportOptions.plist" \
            CODE_SIGN_IDENTITY="${CERT_HASH:-Apple Distribution}" \
            DEVELOPMENT_TEAM=T8348X4CNY \
            CODE_SIGN_STYLE=Manual \
            -allowProvisioningUpdates
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - /var/folders/**/*.xcdistributionlogs
    publishing:
      email:
        recipients:
          - jadtneamou@proton.me
          - zelghourfi@gmail.com
      app_store_connect:
        auth: integration
        submit_to_app_store: false
        submit_to_testflight: true
