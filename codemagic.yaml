workflows:
  ios-app-store:
    name: GojoCalories iOS Build & App Store
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    integrations:
      app_store_connect: Codemagic CI
    scripts:
      - name: Set up code signing
        script: |
          export APP_STORE_CONNECT_ISSUER_ID="ada504ee-3c9d-4491-b7b2-db490afe913a"
          export APP_STORE_CONNECT_KEY_IDENTIFIER="G4ML936L73"
          export APP_STORE_CONNECT_PRIVATE_KEY="$(cat ios_signing/AuthKey.p8)"
          keychain initialize
          app-store-connect fetch-signing-files "com.gojocalories.gojocalories" --type IOS_APP_DEVELOPMENT --create || true
          app-store-connect fetch-signing-files "com.gojocalories.gojocalories" --type IOS_APP_STORE --create
          keychain add-certificates
          keychain add-certificates --certificate ios_signing/gojo_development.p12 --certificate-password "" || true
          xcode-project use-profiles
      - name: Install dependencies
        script: |
          flutter packages pub get
      - name: iOS release build
        script: |
          # 1. Compile the Flutter Dart payload natively, completely ignoring Apple Certificates
          flutter build ios --release --no-codesign

          # 2. Extract the Provisioning Profile UUID natively fetched by Codemagic app-store-connect API
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "Listing profiles in $PROFILES_HOME:"
          ls "$PROFILES_HOME"
          
          # Extract the first profile UUID found
          PROFILE_UUID=$(grep -aA1 UUID "$PROFILES_HOME"/*.mobileprovision | grep string | awk -F '>|<' '{print $3}' | head -n 1)
          echo "Extracted PROFILE_UUID: $PROFILE_UUID"

          # 3. Force Manual Signing in the project file to ensure CLI overrides are respected
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer"/CODE_SIGN_IDENTITY = "Apple Distribution"/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY\[sdk=iphoneos\*\] = "iPhone Developer"/CODE_SIGN_IDENTITY = "Apple Distribution"/g' ios/Runner.xcodeproj/project.pbxproj

          # 4. Force Xcode to Archive the payload.
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -archivePath build/ios/archive/Runner.xcarchive \
            -configuration Release \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
            DEVELOPMENT_TEAM=T8348X4CNY

          # 5. Natively export using our explicit dynamically-bound ExportOptions.plist
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios_signing/ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - jadtneamou@proton.me
          - zelghourfi@gmail.com
      app_store_connect:
        auth: integration
        submit_to_app_store: false
        submit_to_testflight: true
