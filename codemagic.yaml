workflows:
  ios-app-store:
    name: GojoCalories iOS Build & App Store
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    integrations:
      app_store_connect: Codemagic CI
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          
          # Manually install the provisioning profile from the repo
          # Note: Using the version confirmed from the user's Downloads
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp ios_signing/GojoCalories_App_Store_Profile.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/Profile.mobileprovision"
          
          # Import the confirmed certificate with the provided password
          echo "Importing certificate..."
          keychain add-certificates \
            --certificate ios_signing/Certificates.p12 \
            --certificate-password "GojoCalories@0989"

          # Diagnostics: Verify identities
          security find-identity -v -p codesigning
          
          # Patch the project to use the manually installed profile
          xcode-project use-profiles --archive-method app-store

          # Debug: confirm the export_options.plist was generated
          echo "--- Generated export_options.plist ---"
          if [ -f "$HOME/export_options.plist" ]; then
            cat "$HOME/export_options.plist"
          else
            echo "ERROR: export_options.plist was not generated!"
            exit 1
          fi

      - name: Install dependencies
        script: |
          flutter packages pub get

      - name: iOS release build
        script: |
          # Step 1: Compile the Flutter/Dart code WITHOUT signing.
          flutter build ios --release --no-codesign

          # Step 2: Archive the project using raw xcodebuild (explicit signing)
          # We specify the profile only for the main target by using PROVISIONING_PROFILE_SPECIFIER
          # We also use the generic 'Apple Distribution' identity to match the imported certificate.
          mkdir -p build/ios/xcarchive
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/xcarchive/Runner.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=T8348X4CNY \
            PROVISIONING_PROFILE_SPECIFIER="GojoCalories App Store Profile" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            COMPILER_INDEX_STORE_ENABLE=NO

          # Step 3: Export the IPA using the previously generated export_options.plist
          # The export_options.plist was saved to $HOME in the previous step.
          mkdir -p build/ios/ipa
          xcodebuild \
            -exportArchive \
            -archivePath build/ios/xcarchive/Runner.xcarchive \
            -exportOptionsPlist "$HOME/export_options.plist" \
            -exportPath build/ios/ipa

    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/export_options.plist
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - jadtneamou@proton.me
          - zelghourfi@gmail.com
      app_store_connect:
        auth: integration
        submit_to_app_store: false
        submit_to_testflight: true
