workflows:
  ios-app-store:
    name: GojoCalories iOS Build & App Store
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    integrations:
      app_store_connect: Codemagic CI
    scripts:
      - name: Set up code signing
        script: |
          export APP_STORE_CONNECT_ISSUER_ID="ada504ee-3c9d-4491-b7b2-db490afe913a"
          export APP_STORE_CONNECT_KEY_IDENTIFIER="G4ML936L73"
          export APP_STORE_CONNECT_PRIVATE_KEY="$(cat ios_signing/AuthKey.p8)"
          keychain initialize
          app-store-connect fetch-signing-files "com.gojocalories.gojocalories" --type IOS_APP_DEVELOPMENT --create || true
          app-store-connect fetch-signing-files "com.gojocalories.gojocalories" --type IOS_APP_STORE --create
          keychain add-certificates
          keychain add-certificates --certificate ios_signing/gojo_development.p12 --certificate-password "" || true
          xcode-project use-profiles
      - name: Install dependencies
        script: |
          flutter packages pub get
      - name: iOS release build
        script: |
          # 1. Ensure the workspace is clean and project is NOT damaged
          git checkout ios/Runner.xcodeproj/project.pbxproj

          # 2. Compile the Flutter Dart payload natively
          # This also runs pod install correctly
          flutter build ios --release --no-codesign

          # 3. Identify the App Store Provisioning Profile
          # We check the standard directory AND Codemagic's environment
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          
          # Wait a moment for profiles to be synced if they were just fetched
          sleep 5
          
          PROFILE_PATH=$(ls "$PROFILES_HOME"/*.mobileprovision 2>/dev/null | head -n 1)
          if [ -n "$PROFILE_PATH" ]; then
            PROFILE_UUID=$(grep -aA1 UUID "$PROFILE_PATH" | grep string | awk -F '>|<' '{print $3}' | head -n 1)
            echo "Found Profile UUID: $PROFILE_UUID"
            
            # Deep-inject signing settings safely (avoiding empty values)
            sed -i '' "s/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual; PROVISIONING_PROFILE_SPECIFIER = $PROFILE_UUID; CODE_SIGN_IDENTITY = \"Apple Distribution\";/g" ios/Runner.xcodeproj/project.pbxproj
          else
            echo "WARNING: No provisioning profile found. Archive may fail if signing is required."
          fi

          # 4. Force Xcode to Archive the payload.
          # We allow it to fail signing here if needed by passing CODE_SIGNING_ALLOWED=NO
          # The REAL signing happens during export using ExportOptions.plist
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -archivePath build/ios/archive/Runner.xcarchive \
            -configuration Release \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

          # 5. Natively export using our explicit dynamically-bound ExportOptions.plist
          # The exportArchive step WILL sign the app using the certificates in the keychain 
          # and the profile mapping in ExportOptions.plist
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios_signing/ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - jadtneamou@proton.me
          - zelghourfi@gmail.com
      app_store_connect:
        auth: integration
        submit_to_app_store: false
        submit_to_testflight: true
