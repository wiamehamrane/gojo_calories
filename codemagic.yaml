workflows:
  ios-app-store:
    name: GojoCalories iOS Build & App Store
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    integrations:
      app_store_connect: Codemagic CI
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          
          # Manually install the provisioning profile
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp ios_signing/GojoCalories_App_Store_Profile.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/Profile.mobileprovision"
          
          # Import the confirmed certificate
          echo "Importing certificate..."
          keychain add-certificates \
            --certificate ios_signing/Certificates.p12 \
            --certificate-password "GojoCalories@0989"

          # Authorize the private key for codesigning.
          # We unlock the specific keychain Codemagic created.
          BUILD_KEYCHAIN=$(keychain default)
          security unlock-keychain -p "" "$BUILD_KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$BUILD_KEYCHAIN"
          
          # Surgical patch of project.pbxproj to hardcode signing for the MAIN target only.
          # This prevents signing settings from leaking to Pods via the command line.
          echo "Surgically patching Runner project settings..."
          python3 -c "
          import sys
          path = 'ios/Runner.xcodeproj/project.pbxproj'
          content = open(path).read()
          # Target the Release configuration (ID 97C147041CF9000F007C117D)
          search_str = '97C147041CF9000F007C117D /* Release */ = {\n\t\t\tisa = XCBuildConfiguration;\n\t\t\tbuildSettings = {'
          replace_str = search_str + '\n\t\t\t\tCODE_SIGN_IDENTITY = \"Apple Distribution: Jad Tneamou (T8348X4CNY)\";\n\t\t\t\tCODE_SIGN_STYLE = Manual;\n\t\t\t\tDEVELOPMENT_TEAM = T8348X4CNY;\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = \"GojoCalories App Store Profile\";'
          if search_str in content:
              new_content = content.replace(search_str, replace_str)
              with open(path, 'w') as f:
                  f.write(new_content)
              print('Successfully patched pbxproj')
          else:
              print('Warning: Release configuration block not found exactly as expected')
          "

          # Patch the project to generate export_options.plist
          xcode-project use-profiles --archive-method app-store

          # Debug: confirm the export_options.plist was generated
          echo "--- Generated export_options.plist ---"
          if [ -f "$HOME/export_options.plist" ]; then
            cat "$HOME/export_options.plist"
          else
            echo "ERROR: export_options.plist was not generated!"
            exit 1
          fi

      - name: Install dependencies
        script: |
          flutter packages pub get

      - name: iOS release build
        script: |
          # Step 1: Compile the Flutter/Dart code WITHOUT signing.
          flutter build ios --release --no-codesign

          # Step 2: Final Verify identities after partitioning
          # This confirms the private key is accessible.
          security find-identity -v -p codesigning
          
          # Step 3: Archive using raw xcodebuild
          # IMPORTANT: We do NOT pass PROVISIONING_PROFILE_SPECIFIER or CODE_SIGN_IDENTITY here.
          # These are now hardcoded into the Runner.xcodeproj/project.pbxproj for ONLY the main target.
          # This prevents them from leaking into Pods targets (Error 65).
          mkdir -p build/ios/xcarchive
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/xcarchive/Runner.xcarchive \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO

          # Step 4: Export the IPA using the previously generated export_options.plist
          mkdir -p build/ios/ipa
          xcodebuild \
            -exportArchive \
            -archivePath build/ios/xcarchive/Runner.xcarchive \
            -exportOptionsPlist "$HOME/export_options.plist" \
            -exportPath build/ios/ipa

    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/export_options.plist
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - jadtneamou@proton.me
          - zelghourfi@gmail.com
      app_store_connect:
        auth: integration
        submit_to_app_store: false
        submit_to_testflight: true
