workflows:
  ios-app-store:
    name: GojoCalories iOS Build & App Store
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    integrations:
      app_store_connect: Codemagic CI
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          
          # Manually install the provisioning profile
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp ios_signing/GojoCalories_App_Store_Profile.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/Profile.mobileprovision"
          
          # Import the confirmed certificate
          echo "Importing certificate..."
          keychain add-certificates \
            --certificate ios_signing/Certificates.p12 \
            --certificate-password "GojoCalories@0989"

          # IMPORTANT: Authorize the private key for codesigning. 
          # This prevents "Signing certificate is invalid" (private key access) errors.
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$(keychain default)"
          
          # Patch the project to use the manually installed profile
          xcode-project use-profiles --archive-method app-store

          # Debug: confirm the export_options.plist was generated
          echo "--- Generated export_options.plist ---"
          if [ -f "$HOME/export_options.plist" ]; then
            cat "$HOME/export_options.plist"
          else
            echo "ERROR: export_options.plist was not generated!"
            exit 1
          fi

      - name: Install dependencies
        script: |
          flutter packages pub get

      - name: iOS release build
        script: |
          # Step 1: Compile the Flutter/Dart code WITHOUT signing.
          flutter build ios --release --no-codesign

          # Step 2: Forcibly disable signing for all CocoaPods and Test targets.
          # This resolves Error 65 "image_picker_ios does not support provisioning profiles".
          # We use -i '' for macOS (Codemagic runner).
          echo "Patching project to disable signing for third-party libs and tests..."
          find ios -name "project.pbxproj" -exec sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGNING_ALLOWED = NO;/g' {} +
          find ios -name "project.pbxproj" -exec sed -i '' 's/CODE_SIGNING_REQUIRED = YES;/CODE_SIGNING_REQUIRED = NO;/g' {} +

          # Step 3: Archive the project using raw xcodebuild (explicit signing for main target)
          mkdir -p build/ios/xcarchive
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/xcarchive/Runner.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=T8348X4CNY \
            PROVISIONING_PROFILE_SPECIFIER="GojoCalories App Store Profile" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            COMPILER_INDEX_STORE_ENABLE=NO

          # Step 4: Export the IPA using the previously generated export_options.plist
          mkdir -p build/ios/ipa
          xcodebuild \
            -exportArchive \
            -archivePath build/ios/xcarchive/Runner.xcarchive \
            -exportOptionsPlist "$HOME/export_options.plist" \
            -exportPath build/ios/ipa

    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/export_options.plist
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - jadtneamou@proton.me
          - zelghourfi@gmail.com
      app_store_connect:
        auth: integration
        submit_to_app_store: false
        submit_to_testflight: true
