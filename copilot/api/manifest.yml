# The manifest for the "api" service.
# Read the full specification for the "Load Balanced Web Service" type at:
#  https://aws.github.io/copilot-cli/docs/manifest/lb-web-service/

# Your service name will be used in naming your resources like log groups, ECS services, etc.
name: api
type: Load Balanced Web Service

# Distribute traffic to your service.
http:
  path: '/'
  alias: api.gojocalories.com
  hosted_zone: Z0346355R6ZEM25G0C0T
  healthcheck:
    path: /
    healthy_threshold: 2
    unhealthy_threshold: 3
    interval: 15s
    timeout: 10s

# Configuration for your containers and service.
image:
  # Docker build arguments. For additional overrides: https://aws.github.io/copilot-cli/docs/manifest/lb-web-service/#image-build
  build:
    dockerfile: backend/Dockerfile
    context: backend
  # Port exposed through your container to route traffic to it.
  port: 5000

cpu: 256       # Number of CPU units for the task.
memory: 512    # Amount of memory in MiB used by the task.
count: 1       # Number of tasks that should be running in your service.
exec: true     # Enable running commands in your container.
network:
  connect: true # Enable Service Connect for intra-environment traffic between services.
  vpc:
    security_groups:
      - from_cfn: ${COPILOT_APPLICATION_NAME}-${COPILOT_ENVIRONMENT_NAME}-gojodbSecurityGroup

# storage:
  # readonly_fs: true       # Limit to read-only access to mounted root filesystems.

# Optional fields for more advanced use-cases.
#
variables:                    # Pass environment variables as key value pairs.
  LOG_LEVEL: info
  WIPE_DB: "false"
  GOOGLE_WEB_CLIENT_ID: 980076580409-rgqujk89m5lhvsr3nfg24hhodk08uoeh.apps.googleusercontent.com

secrets:
  GEMINI_API_KEY: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/GEMINI_API_KEY
  SECRET_KEY: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/SECRET_KEY
  ALLOWED_ORIGINS: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/ALLOWED_ORIGINS
  AWS_BUCKET_NAME: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/AWS_BUCKET_NAME
  DB_SECRET:
    from_cfn: ${COPILOT_APPLICATION_NAME}-${COPILOT_ENVIRONMENT_NAME}-gojodbAuroraSecret
  STRIPE_SECRET_KEY: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/STRIPE_SECRET_KEY
  STRIPE_WEBHOOK_SECRET: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/STRIPE_WEBHOOK_SECRET
  STRIPE_PUBLISHABLE_KEY: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/STRIPE_PUBLISHABLE_KEY
  FOODDATA_CENTRAL_API_KEY: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/FOODDATA_CENTRAL_API_KEY



# Grant the task permission to access the S3 bucket
iam_policy_statements:
  - effect: Allow
    actions:
      - s3:PutObject
      - s3:PutObjectAcl
      - s3:GetObject
      - s3:ListBucket
    resources:
      - arn:aws:s3:::gojocalories-media-uploads
      - arn:aws:s3:::gojocalories-media-uploads/*
  - effect: Allow
    actions:
      - ssm:GetParameters
      - ssm:GetParameter
    resources:
      - arn:aws:ssm:us-east-1:368306127521:parameter/copilot/gojocalories/prod/secrets/*

# You can override any of the values defined above by environment.

