# The manifest for the "api" service.
# Read the full specification for the "Load Balanced Web Service" type at:
#  https://aws.github.io/copilot-cli/docs/manifest/lb-web-service/

name: api
type: Load Balanced Web Service

http:
  path: '/'
  alias: api.gojocalories.com
  hosted_zone: Z08140152Y3748IHFP8PT
  idle_timeout: 120s
  healthcheck:
    path: /
    healthy_threshold: 2
    unhealthy_threshold: 3
    interval: 15s
    timeout: 10s

image:
  # Built and pushed by scripts/deploy.sh (Copilot v1.34.1 drops the ECR URI when using image.build).
  location: 640471340191.dkr.ecr.us-east-1.amazonaws.com/gojocalories/api:latest
  port: 5000

cpu: 256
memory: 512
count: 1
exec: true

network:
  connect: true
  vpc:
    security_groups:
      - from_cfn: ${COPILOT_APPLICATION_NAME}-${COPILOT_ENVIRONMENT_NAME}-gojodbSecurityGroup

variables:
  LOG_LEVEL: info
  WIPE_DB: "false"
  OPENAI_MODEL: gpt-5.4-mini
  GOOGLE_WEB_CLIENT_ID: 980076580409-rgqujk89m5lhvsr3nfg24hhodk08uoeh.apps.googleusercontent.com
  APPLE_APP_ID: "6762560685"
  SES_SENDER_EMAIL: noreply@gojocalories.com
  AWS_REGION: us-east-1
  # Keep SMTP until SES leaves sandbox (ProductionAccess=false today).
  # Apex SPF now authorizes PrivateEmail — without it Gmail silently drops mail.
  EMAIL_PROVIDER: smtp
  SMTP_HOST: mail.privateemail.com
  SMTP_PORT: "587"                       # 465 = SSL, 587 = STARTTLS
  SMTP_FROM: GojoCalories <contact@gojocalories.com>
  # Smart nutrition push notifications (see SMART_NOTIFICATIONS.md)
  SMART_NOTIF_ENABLED: "true"
  SMART_NOTIF_INTERVAL_HOURS: "2"
  SMART_NOTIF_TZ_OFFSET_MIN: "60"        # users' timezone offset from UTC in minutes (60 = UTC+1)

secrets:
  OPENAI_API_KEY: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/OPENAI_API_KEY
  SECRET_KEY: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/SECRET_KEY
  ALLOWED_ORIGINS: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/ALLOWED_ORIGINS
  AWS_BUCKET_NAME: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/AWS_BUCKET_NAME
  DB_SECRET:
    from_cfn: ${COPILOT_APPLICATION_NAME}-${COPILOT_ENVIRONMENT_NAME}-gojodbAuroraSecret
  STRIPE_SECRET_KEY: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/STRIPE_SECRET_KEY
  STRIPE_WEBHOOK_SECRET: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/STRIPE_WEBHOOK_SECRET
  STRIPE_PUBLISHABLE_KEY: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/STRIPE_PUBLISHABLE_KEY
  FOODDATA_CENTRAL_API_KEY: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/FOODDATA_CENTRAL_API_KEY
  APPLE_SHARED_SECRET: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/APPLE_SHARED_SECRET
  SMTP_USER: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/SMTP_USER
  SMTP_PASS: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/SMTP_PASS
  ONESIGNAL_REST_API_KEY: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/ONESIGNAL_REST_API_KEY
  ADMIN_API_KEY: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/ADMIN_API_KEY
# IAM permissions are managed via addons/s3-ssm-policy.yml